  // ==========================================
  // ⭐ GLOBAL HELPER: ระบบบันทึก Log ลง Supabase

  async function writeLogToSupabase(action, module, details, userEmail = "System") {
      if (!window.supabase) return;
      const logId = "LOG-" + new Date().getTime(); 
      const now = new Date();
      const tsStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}T${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`; 

      try {
          const payload = {
              log_id: logId,
              user_email: userEmail,
              action: action,
              module: module,
              details: details,
              created_at: tsStr
          };
          await window.supabase.from('db_logs').insert([payload]); 
      } catch(e) { 
          console.error("Log error (ignored):", e); 
      }
  }

 // ==========================================
  // 🌟 BULLETPROOF INITIALIZATION 🌟
  // ==========================================
  async function initGlobalApp() {
      // 1. ตรวจสอบว่า Supabase พร้อมทำงานหรือไม่
      if (!window.supabase || !window.supabase.auth) {
          setTimeout(initGlobalApp, 100);
          return;
      }

      // 🌟 [ดึงข้อมูลสิทธิ์ล็อกอินจาก URL ด้านบนสุดเพื่อแก้ปัญหา Iframe Sandbox] 🌟
      if (typeof google !== 'undefined' && google.script && google.script.url) {
          google.script.url.getLocation(async function(location) {
              let hash = location.hash;
              
              // ตรวจสอบว่าหน้าต่างหลักมี access_token ส่งมาหรือไม่
              if (hash && hash.includes('access_token=')) {
                  let cleanHash = hash.startsWith('#') ? hash.substring(1) : hash;
                  let params = new URLSearchParams(cleanHash);
                  let accessToken = params.get('access_token');
                  let refreshToken = params.get('refresh_token');
                  
                  if (accessToken && refreshToken) {
                      showLoading();
                      // บังคับกำหนดเซสชันล็อกอินแบบ Manual เข้าไปใน Iframe
                      const { data, error } = await window.supabase.auth.setSession({
                          access_token: accessToken,
                          refresh_token: refreshToken
                      });
                      
                      if (!error) {
                          console.log("Logged in successfully via Parent URL Hash!");
                          hideLoading(); // ต้องปิด Loading ก่อนแสดงหน้าจอสำเร็จ
                          
                          // สร้างหน้าจอแจ้งเตือนให้ผู้ใช้คลิกปุ่มเพื่อไปต่อ (Bypass User Activation)
                          document.body.innerHTML = `
                              <div style="height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; background: #F0F4F8; flex-direction: column; text-align: center; padding: 20px; position: fixed; top: 0; left: 0; z-index: 9999;">
                                  <i class="fas fa-check-circle text-success mb-4" style="font-size: 4rem;"></i>
                                  <h3 class="fw-bold text-dark mb-2">เข้าสู่ระบบสำเร็จ</h3>
                                  <p class="text-muted mb-4">ระบบตรวจสอบสิทธิ์เรียบร้อยแล้ว กรุณาคลิกปุ่มด้านล่างเพื่อเข้าสู่ระบบ</p>
                                  <button onclick="window.top.location.replace('${scriptUrl}?page=home')" class="btn btn-primary rounded-pill px-5 py-3 fw-bold shadow-sm" style="background-color: #31C1D7; border-color: #31C1D7; font-size: 1.1rem; cursor: pointer;">
                                      <i class="fas fa-home me-2"></i> เข้าสู่หน้าหลัก
                                  </button>
                              </div>
                          `;
                          return;
                      } else {
                          console.error("Failed to set manual session:", error);
                          hideLoading();
                      }
                  }
              }

              // หากไม่มีโทเค็นใน URL หรือเกิดข้อผิดพลาด ให้ใช้วิธีเช็คเซสชันล็อกอินตามปกติ
              proceedWithSessionCheck();
          });
      } else {

      }
  }


  // ฟังก์ชันตรวจสอบเซสชันปกติ
  async function proceedWithSessionCheck() {
      const { data: { session }, error } = await window.supabase.auth.getSession();
      
      if (!session) {
          console.warn("No active session found. Showing login button overlay...");
          
          // บังคับแสดงหน้าจอที่มีปุ่มให้คลิก เพื่อป้องกันการบล็อกของเบราว์เซอร์
          document.body.innerHTML = `
              <div style="height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; background: #F0F4F8; flex-direction: column; text-align: center; padding: 20px; position: fixed; top: 0; left: 0; z-index: 9999;">
                  <i class="fas fa-user-lock text-muted mb-4" style="font-size: 4rem;"></i>
                  <h3 class="fw-bold text-dark mb-2">เซสชันหมดอายุ หรือยังไม่ได้เข้าสู่ระบบ</h3>
                  <p class="text-muted mb-4">ระบบรักษาความปลอดภัยของ Google กำหนดให้ท่านคลิกปุ่มด้านล่างเพื่อดำเนินการต่อ</p>
                  <a href="${scriptUrl}?page=login" target="_top" class="btn btn-primary rounded-pill px-5 py-3 fw-bold shadow-sm" style="background-color: #31C1D7; border-color: #31C1D7; font-size: 1.1rem; text-decoration: none;">
                      <i class="fas fa-sign-in-alt me-2"></i> คลิกเพื่อไปหน้าเข้าสู่ระบบ
                  </a>
              </div>
          `;
          return; 
      }

      // ดึงอีเมลผู้ใช้จาก Session มาแสดงผล
      const userEmail = session.user.email;
      const userEmailEl = document.getElementById('userEmailDisplay');
      if(userEmailEl) userEmailEl.textContent = userEmail;

      // 2. จัดการแถบเมนู Active ด้านข้าง
      try {
          if (typeof google !== 'undefined' && google.script && google.script.url) {
              google.script.url.getLocation(function(location) {
                  const currentPage = location.parameter.page || 'home';
                  document.querySelectorAll('.nav-link-custom').forEach(el => el.classList.remove('active'));
                  const targetLink = document.querySelector(`.nav-link-custom[data-page="${currentPage}"]`);
                  if (targetLink) targetLink.classList.add('active');
                  else {
                      const homeLink = document.querySelector(`.nav-link-custom[data-page="home"]`);
                      if(homeLink) homeLink.classList.add('active');
                  }
              });
          }
      } catch (e) {
          console.warn("Sidebar active sync skipped:", e);
      }

      // ฟังก์ชันจัดการแสดงผลเมนูและปุ่มการ์ดบนหน้าต่างตามสิทธิ์ผู้ใช้งาน
      const applyMenuPermissions = (isFullAdmin, hasVerifyAccess) => {
          const navConfig = document.getElementById('nav-config');
          const navVerify = document.getElementById('nav-verify');
          const navAccount = document.getElementById('nav-account');
          
          const homeConfig = document.getElementById('menu-config-card');
          const homeVerify = document.getElementById('home-card-verify');
          const homeAccount = document.getElementById('home-card-account');

          if (isFullAdmin) {
              if (navConfig) navConfig.classList.remove('d-none');
              if (homeConfig) homeConfig.classList.remove('d-none');
          }
          if (hasVerifyAccess) {
              if (navVerify) navVerify.classList.remove('d-none');
              if (navAccount) navAccount.classList.remove('d-none');
              if (homeVerify) homeVerify.classList.remove('d-none');
              if (homeAccount) homeAccount.classList.remove('d-none');
          }
      };

      // 3. ตรวจสอบสิทธิ์จากฐานข้อมูล (Admins / Verify Access)
      try {
          const { data: perms } = await window.supabase
              .from('prs_config')
              .select('category, value')
              .in('category', ['Admins', 'Verify Access']);
              
          if (perms && perms.length > 0) {
              const userLower = userEmail.toLowerCase();
              const admins = perms.filter(d => d.category === 'Admins').map(d => String(d.value).toLowerCase());
              const verifyAccess = perms.filter(d => d.category === 'Verify Access').map(d => String(d.value).toLowerCase());
              
              const isFullAdmin = admins.includes(userLower);
              const hasVerifyAccess = isFullAdmin || verifyAccess.includes(userLower);
              
              applyMenuPermissions(isFullAdmin, hasVerifyAccess);
          }
      } catch (err) {
          console.error("Supabase permission check error:", err);
      }

      // 4. ติดตามสถานะ (Listener) หากผู้ใช้ออกจากระบบ
      window.supabase.auth.onAuthStateChange((event, session) => {
          if (event === 'SIGNED_OUT') {
               document.body.innerHTML = `
                  <div style="height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; background: #F0F4F8; flex-direction: column; text-align: center; padding: 20px; position: fixed; top: 0; left: 0; z-index: 9999;">
                      <h3 class="fw-bold text-dark mb-3">ออกจากระบบเรียบร้อย</h3>
                      <a href="${scriptUrl}?page=login" target="_top" class="btn btn-primary rounded-pill px-5 py-3 fw-bold shadow-sm" style="background-color: #31C1D7; border-color: #31C1D7; text-decoration: none;">เข้าสู่ระบบอีกครั้ง</a>
                  </div>
               `;
          }
      });

      // 5. ผูกคำสั่งให้กับ Global Search (กล่องค้นหาด้านบน)
      const searchInput = document.getElementById('globalSearchInput');
      const resultsContainer = document.getElementById('globalSearchResults');
      let globalSearchTimeout = null;

      if (searchInput && resultsContainer) {
          searchInput.addEventListener('keyup', function(e) {
              clearTimeout(globalSearchTimeout);
              const keyword = e.target.value.trim();
              const spinner = document.getElementById('globalSearchSpinner');
              
              if (keyword.length < 3) {
                  resultsContainer.style.display = 'none';
                  if(spinner) spinner.classList.add('d-none');
                  return;
              }
              
              if(spinner) spinner.classList.remove('d-none');
              
              globalSearchTimeout = setTimeout(async () => {
                  try {
                      const res = await globalSmartSearchSupabase(keyword);
                      if(spinner) spinner.classList.add('d-none');
                      renderGlobalSearchResults(res);
                  } catch(err) {
                      if(spinner) spinner.classList.add('d-none');
                      console.error("Search Error:", err);
                      resultsContainer.innerHTML = `<div class="p-3 text-center text-danger small">Error: เกิดข้อผิดพลาดในการค้นหา</div>`;
                      resultsContainer.style.display = 'block';
                  }
              }, 500); 
          });
          
          document.addEventListener('click', function(e) {
              if (!e.target.closest('#globalSearchInput') && !e.target.closest('#globalSearchResults')) {
                  resultsContainer.style.display = 'none';
              }
          });
      }
  }

  // 🚀 ฟังก์ชันค้นหาข้อมูลจาก Supabase 4 ตารางพร้อมกัน
  async function globalSmartSearchSupabase(keyword) {
      if (!window.supabase) throw new Error("Supabase is not initialized");
      const kw = `%${keyword}%`;
      
      const [obRes, vmRes, vaRes, hRes] = await Promise.all([
          supabase.from('prs_onboard').select('maid_code, full_name, id_card').or(`full_name.ilike.${kw},id_card.ilike.${kw},maid_code.ilike.${kw}`).limit(5),
          supabase.from('prs_verify_master').select('maid_code, full_name, id_card').or(`full_name.ilike.${kw},id_card.ilike.${kw},maid_code.ilike.${kw}`).limit(5),
          supabase.from('prs_verify_annual').select('ref_code, full_name, id_card').or(`full_name.ilike.${kw},id_card.ilike.${kw},ref_code.ilike.${kw}`).limit(5),
          supabase.from('prs_hold').select('maid_code, full_name, id_card').or(`full_name.ilike.${kw},id_card.ilike.${kw},maid_code.ilike.${kw}`).limit(5)
      ]);

      let resultsMap = new Map();

      const processResult = (res, moduleName, codeField) => {
          if (!res || res.error || !res.data) return;
          res.data.forEach(item => {
              const cleanId = String(item.id_card || '').replace(/\D/g, '');
              const uniqueKey = cleanId || item.full_name;
              const code = item[codeField];

              if(resultsMap.has(uniqueKey)) {
                  let existing = resultsMap.get(uniqueKey);
                  if(!existing.foundIn.includes(moduleName)) existing.foundIn.push(moduleName);
                  if(!existing.code && code) existing.code = code;
              } else {
                  resultsMap.set(uniqueKey, {
                      name: item.full_name || '-',
                      idCard: item.id_card || '-',
                      code: code || '',
                      foundIn: [moduleName]
                  });
              }
          });
      };

      processResult(obRes, 'Onboard', 'maid_code');
      processResult(vmRes, 'Master', 'maid_code');
      processResult(vaRes, 'Annual', 'ref_code');
      processResult(hRes, 'Hold', 'maid_code');

      return { success: true, data: Array.from(resultsMap.values()).slice(0, 15) };
  }

  // รันระบบตั้งต้น
  if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initGlobalApp);
  } else {
      initGlobalApp();
  }

  // ==========================================
  // 🌟 RENDER SEARCH RESULTS 🌟
  // ==========================================
  function renderGlobalSearchResults(res) {
      const container = document.getElementById('globalSearchResults');
      container.innerHTML = '';
      
      if (!res.success) {
          container.innerHTML = `<div class="p-3 text-center text-danger small"><i class="fas fa-exclamation-triangle me-1"></i> ${res.message}</div>`;
          container.style.display = 'block';
          return;
      }
      
      if (!res.data || res.data.length === 0) {
          container.innerHTML = `
              <div class="text-center py-4">
                  <i class="fas fa-search fa-2x text-muted opacity-25 mb-2"></i>
                  <div class="small text-muted fw-bold">ไม่พบข้อมูลผู้ให้บริการ</div>
              </div>`;
          container.style.display = 'block';
          return;
      }
      
      let html = `<h6 class="dropdown-header fw-bold text-primary mb-2 px-2 border-bottom pb-2">ผลการค้นหาเจอ ${res.data.length} รายการ</h6>`;
      
      res.data.forEach(item => {
          let badgesHtml = '';
          item.foundIn.forEach(mod => {
              let badgeClass = 'bg-secondary';
              if(mod.includes('Master')) badgeClass = 'bg-primary';
              else if(mod.includes('Onboard')) badgeClass = 'bg-info text-dark';
              else if(mod.includes('Annual')) badgeClass = 'bg-warning text-dark';
              else if(mod.includes('Hold')) badgeClass = 'bg-danger text-white';
              
              badgesHtml += `<span class="badge ${badgeClass} me-1 mb-1 shadow-sm" style="font-size: 0.7rem; font-weight: 500;">${mod}</span>`;
          });
          
          html += `
              <a href="https://admin-test.beneat.co/professional/${item.code || ''}/profile" target="_blank" class="dropdown-item p-3 mb-2 rounded-3 border bg-light text-wrap transition-all hover-shadow" style="transition: all 0.2s;">
                  <div class="d-flex justify-content-between align-items-start mb-1">
                      <span class="fw-bold text-dark">${item.name}</span>
                      <span class="badge bg-white text-primary border">${item.code || '-'}</span>
                  </div>
                  <div class="small text-muted mb-2"><i class="far fa-id-card me-1 text-secondary"></i> ${item.idCard || '-'}</div>
                  <div class="d-flex flex-wrap">${badgesHtml}</div>
              </a>
          `;
      });
      
      container.innerHTML = html;
      container.style.display = 'block';
  }

  // ==========================================
  // 🌟 GLOBAL HELPERS 🌟
  // ==========================================
  window.fetchAllSupabaseData = async function(tableName, orderByField, ascending = false) {
      if (!window.supabase) return [];
      let allData = [];
      let from = 0;
      const limit = 1000;
      let hasMore = true;

      while (hasMore) {
          let query = window.supabase.from(tableName).select('*').range(from, from + limit - 1);
          if (orderByField) {
              query = query.order(orderByField, { ascending: ascending, nullsFirst: false });
          }

          const { data, error } = await query;
          if (error) throw error;

          if (data && data.length > 0) {
              allData = allData.concat(data);
              from += limit;
              if (data.length < limit) hasMore = false;
          } else {
              hasMore = false;
          }
      }
      return allData;
  };

  if (typeof window.showLoading !== 'function') {
      window.showLoading = function() {
          if (typeof Swal !== 'undefined') Swal.fire({ title: 'กำลังโหลด...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
      };
  }
  if (typeof window.hideLoading !== 'function') {
      window.hideLoading = function() {
          if (typeof Swal !== 'undefined') Swal.close();
      };
  }
  if (typeof window.showError !== 'function') {
      window.showError = function(msg) {
          if (typeof Swal !== 'undefined') Swal.fire('Error', msg, 'error');
          else alert('Error: ' + msg);
      };
  }
</script>
